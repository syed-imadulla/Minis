<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculator</title>

    <link rel="stylesheet" href="calculator.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- =========================================
     BACKGROUND
========================================= -->

    <div class="night-background">
      <div class="moon"></div>

      <div id="stars"></div>

      <div class="glow glow1"></div>
      <div class="glow glow2"></div>
    </div>

    <!-- =========================================
     CALCULATOR
========================================= -->

    <div class="calculator-container">
      <div class="calculator-card">
        <div class="calc-header">
          <h1>Calculator</h1>

          <p>Keyboard & Mouse Supported</p>
        </div>

        <!-- DISPLAY -->

        <div id="display">0</div>

        <!-- BUTTONS -->

        <div class="buttons">
          <button class="btn special" data-value="C">C</button>
          <button class="btn special" data-value="(">(</button>
          <button class="btn special" data-value=")">)</button>
          <button class="btn operator" data-value="/">÷</button>

          <button class="btn" data-value="7">7</button>
          <button class="btn" data-value="8">8</button>
          <button class="btn" data-value="9">9</button>
          <button class="btn operator" data-value="*">×</button>

          <button class="btn" data-value="4">4</button>
          <button class="btn" data-value="5">5</button>
          <button class="btn" data-value="6">6</button>
          <button class="btn operator" data-value="-">−</button>

          <button class="btn" data-value="1">1</button>
          <button class="btn" data-value="2">2</button>
          <button class="btn" data-value="3">3</button>
          <button class="btn operator" data-value="+">+</button>

          <button class="btn zero" data-value="0">0</button>
          <button class="btn" data-value=".">.</button>

          <button id="equalBtn">=</button>
        </div>

        <!-- SECRET HINT (hidden) -->

        <span class="hidden-secret"> 121124 </span>
      </div>
    </div>

    <!-- =========================================
     UNLOCK TRANSITION
========================================= -->

    <div id="unlockOverlay">
      <div class="unlock-content">
        <div class="portal-ring"></div>

        <h2>Opening Portal...</h2>
      </div>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
